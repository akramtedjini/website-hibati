<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{
    height:100%; overflow:hidden;
  }

  body{
    background: radial-gradient(circle at 50% 40%, #8B1538 0%, #5C0E24 55%, #2B0712 100%);
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }

  /* soft floating petals in background */
  .petal{
    position:absolute;
    border-radius: 50% 0 50% 50%;
    opacity:0.35;
    animation: float linear infinite;
  }
  @keyframes float{
    0%   { transform: translateY(0) rotate(0deg); opacity:0; }
    10%  { opacity:0.4; }
    90%  { opacity:0.3; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity:0; }
  }

  .message{
    position:relative; z-index:5;
    text-align:center;
    padding: 6vw;
    opacity:0;
    transform: scale(0.85);
    transition: opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.8,.2,1.1);
  }
  .message.show{ opacity:1; transform: scale(1); }

  .message h1{
    font-family:'Playfair Display', serif;
    font-weight:700;
    color:#fff;
    font-size: clamp(34px, 10vw, 64px);
    line-height: 1.15;
    text-shadow: 0 0 40px rgba(255,255,255,0.25), 0 10px 30px rgba(0,0,0,0.4);
    letter-spacing: 0.01em;
  }

  .message .signed{
    margin-top: 28px;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:700;
    color: #FFD9D9;
    font-size: clamp(14px, 3vw, 18px);
    letter-spacing:0.04em;
    opacity:0;
    transition: opacity 1s ease;
    transition-delay: 0.6s;
  }
  .signed.show{ opacity:0.9; }

  .heart{
    position:absolute; z-index:4;
    font-size: 20px;
    opacity:0;
    animation: pop ease forwards;
  }
  @keyframes pop{
    0%{ opacity:0; transform: scale(0.3) translateY(0); }
    20%{ opacity:0.9; transform: scale(1) translateY(-10px); }
    100%{ opacity:0; transform: scale(0.8) translateY(-60px); }
  }
</style>
</head>
<body>

<!-- ===== BACKGROUND MUSIC (plays continuously across all pages) ===== -->
<audio id="bgMusic" src="songs/song.mp3" loop preload="auto"></audio>
<script>
  (function(){
    const audio = document.getElementById('bgMusic');
    const STORAGE_KEY = 'bgMusicTime';
    const PLAYING_KEY = 'bgMusicPlaying';

    const savedTime = parseFloat(localStorage.getItem(STORAGE_KEY));
    if (!isNaN(savedTime)) {
      audio.currentTime = savedTime;
    }

    if (localStorage.getItem(PLAYING_KEY) === 'true') {
      audio.play().catch(() => {});
    }

    function startOnFirstInteraction(){
      if (audio.paused) {
        audio.play().catch(() => {});
      }
      document.removeEventListener('click', startOnFirstInteraction);
      document.removeEventListener('touchstart', startOnFirstInteraction);
    }
    document.addEventListener('click', startOnFirstInteraction);
    document.addEventListener('touchstart', startOnFirstInteraction);

    setInterval(() => {
      localStorage.setItem(STORAGE_KEY, audio.currentTime);
      localStorage.setItem(PLAYING_KEY, (!audio.paused).toString());
    }, 500);

    window.addEventListener('beforeunload', () => {
      localStorage.setItem(STORAGE_KEY, audio.currentTime);
      localStorage.setItem(PLAYING_KEY, (!audio.paused).toString());
    });
  })();
</script>

  <div class="message" id="msg">
    <h1>I LOVE U SO SO SO SO MUCH MY SWEET BABY</h1>
    <div class="signed" id="signed">— forever yours</div>
  </div>

<script>
  // background petals
  const colors = ['#ffffff', '#F4D9D9', '#E8B4B4'];
  for (let i = 0; i < 22; i++){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 8 + Math.random() * 14;
    p.style.width = size + 'px';
    p.style.height = size * 0.8 + 'px';
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.bottom = '-10vh';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (8 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    document.body.appendChild(p);
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('msg').classList.add('show');
      document.getElementById('signed').classList.add('show');
    }, 250);

    // little heart bursts every so often
    function burstHeart(){
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = '♥';
      h.style.left = (10 + Math.random() * 80) + 'vw';
      h.style.top = (60 + Math.random() * 30) + 'vh';
      h.style.color = Math.random() > 0.5 ? '#fff' : '#FFD9D9';
      h.style.animationDuration = (2 + Math.random()) + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 3200);
    }
    setInterval(burstHeart, 700);
  });
</script>

</body>
</html>
