<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}
  html{ scroll-behavior:smooth; }
  body{
    font-family:'Inter', sans-serif;
    background: #FFFBF8;
    color:#2A1A1D;
    overflow-x:hidden;
  }

  :root{
    --red:#8B1538;
    --red-deep:#5C0E24;
    --gold:#D4AF37;
    --blush:#F7E8E8;
    --cream:#FFFBF8;
  }

  /* ===== HERO: bouquet ===== */
  .hero{
    position:relative;
    min-height: 100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    background:
      radial-gradient(circle at 50% 10%, rgba(255,255,255,0.15), transparent 50%),
      linear-gradient(180deg, #F4869F 0%, #F07B9A 50%, #EC7095 100%);
    padding: 8vh 6vw 6vh;
    overflow:hidden;
  }

  .bouquet{ width: min(78vw, 360px); margin-bottom: 18px; }

  .hero .eyebrow{
    font-size:11px; letter-spacing:0.24em; text-transform:uppercase;
    color: #FFFFFF; opacity:0.85; font-weight:600; margin-bottom:10px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.12);
  }
  .hero h1{
    font-family:'Playfair Display', serif;
    font-style:italic; font-weight:600;
    font-size: clamp(28px, 7vw, 46px);
    color: #FFFFFF;
    margin-bottom:14px;
    text-shadow: 0 2px 14px rgba(0,0,0,0.15);
  }
  .hero p.lead{
    max-width:380px; color:#FFE9F0; font-size:14.5px; line-height:1.6;
  }

  .scroll-cue{
    position:absolute; bottom: 28px; left:0; right:0;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    color: #FFFFFF; opacity:0.7; font-size:11px; letter-spacing:0.1em;
  }
  .scroll-cue .arrow{
    width:9px; height:9px; border-right:1.5px solid #FFFFFF; border-bottom:1.5px solid #FFFFFF;
    transform: rotate(45deg);
    animation: bob 1.8s infinite ease-in-out;
  }
  @keyframes bob{ 0%,100%{ transform: rotate(45deg) translateY(0); } 50%{ transform: rotate(45deg) translateY(6px); } }

  /* ===== GALLERY SECTION ===== */
  .gallery-section{
    position:relative;
    padding: 10vh 6vw 12vh;
    background:
      radial-gradient(circle at 30% 10%, rgba(255,255,255,0.5), transparent 35%),
      linear-gradient(160deg, #EAF6FA 0%, #CFE8F1 35%, #A9D2E6 70%, #8FC0DC 100%);
    text-align:center;
    overflow:hidden;
  }
  .gallery-bg{
    position:absolute; inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }
  .gallery-bg-deco{
    position:absolute;
    opacity:0.85;
    filter: drop-shadow(0 4px 10px rgba(40,70,100,0.12));
    z-index:0;
  }
  .gallery-bg-deco.float-3d{
    filter: none;
  }
  .gallery-float-3d{
    position:relative;
    transform-style: preserve-3d;
    animation: galleryFloatDrift var(--float-dur) cubic-bezier(.45,.05,.55,.95) infinite;
    animation-delay: var(--float-delay);
    will-change: transform;
  }
  .gallery-heart-shape{
    display:block;
    transform-style: preserve-3d;
    animation: galleryHeartPulse var(--float-dur) cubic-bezier(.45,.05,.55,.95) infinite;
    animation-delay: var(--float-delay);
    filter: drop-shadow(0 6px 10px rgba(30,55,80,0.18));
    will-change: transform;
  }
  .gallery-heart-shadow{
    position:absolute;
    left:50%; bottom:-6%;
    width:62%; height:14%;
    transform: translateX(-50%);
    border-radius:50%;
    background: radial-gradient(ellipse, rgba(20,40,65,0.30) 0%, rgba(20,40,65,0) 75%);
    animation: galleryShadowPulse var(--float-dur) cubic-bezier(.45,.05,.55,.95) infinite;
    animation-delay: var(--float-delay);
    will-change: transform, opacity;
  }
  @keyframes galleryFloatDrift{
    0%   { transform: translateY(0)                         rotateX(0deg)        rotateY(0deg); }
    50%  { transform: translateY(calc(var(--drift-y) * -1))  rotateX(var(--tilt)) rotateY(calc(var(--tilt) * 0.6)); }
    100% { transform: translateY(0)                          rotateX(0deg)        rotateY(0deg); }
  }
  @keyframes galleryHeartPulse{
    0%   { transform: scale(0.96); }
    50%  { transform: scale(1.06); }
    100% { transform: scale(0.96); }
  }
  @keyframes galleryShadowPulse{
    0%   { transform: translateX(-50%) scale(0.82); opacity:0.55; }
    50%  { transform: translateX(-50%) scale(1.08); opacity:0.95; }
    100% { transform: translateX(-50%) scale(0.82); opacity:0.55; }
  }
  .gallery-section .eyebrow,
  .gallery-section h2,
  .gallery-section .sub,
  .gallery-section .grid{
    position:relative;
    z-index:1;
  }
  .gallery-section .eyebrow{
    font-size:11px; letter-spacing:0.24em; text-transform:uppercase;
    color: #2A4D75; opacity:0.8; font-weight:600; margin-bottom:8px;
  }
  .gallery-section h2{
    font-family:'Playfair Display', serif;
    font-style:italic; font-weight:600;
    font-size: clamp(24px, 5.5vw, 32px);
    color: #2A4D75;
    margin-bottom: 10px;
  }
  .gallery-section .sub{
    color:#3F5F7A; font-size:13.5px; margin-bottom:54px;
  }

  .grid{
    position:relative;
    max-width: 480px;
    margin: 0 auto;
    height: 1180px;
  }
  @media (min-width: 480px){
    .grid{ max-width: 560px; height: 1000px; }
  }

  /* ---- Scattered collage placement: each frame sits absolutely
     within .grid at its own offset/rotation/size so the set reads
     as photos tossed on a table rather than a tidy grid. ---- */
  .frame{
    position:absolute;
  }
  .frame:nth-child(1){ top: 0px;    left: 4%;   width: 56%; transform: rotate(-6deg); z-index:3; }
  .frame:nth-child(2){ top: 60px;   left: 48%;  width: 44%; transform: rotate(8deg);  z-index:2; }
  .frame:nth-child(3){ top: 280px;  left: 2%;   width: 40%; transform: rotate(5deg);  z-index:2; }
  .frame:nth-child(4){ top: 330px;  left: 44%;  width: 52%; transform: rotate(-4deg); z-index:4; }
  .frame:nth-child(5){ top: 580px;  left: 8%;   width: 50%; transform: rotate(7deg);  z-index:3; }
  .frame:nth-child(6){ top: 640px;  left: 50%;  width: 42%; transform: rotate(-9deg); z-index:2; }

  @media (min-width: 480px){
    .frame:nth-child(1){ top: 0px;   left: 2%;   width: 52%; }
    .frame:nth-child(2){ top: 40px;  left: 52%;  width: 42%; }
    .frame:nth-child(3){ top: 240px; left: 0%;   width: 38%; }
    .frame:nth-child(4){ top: 270px; left: 46%;  width: 48%; }
    .frame:nth-child(5){ top: 500px; left: 10%;  width: 46%; }
    .frame:nth-child(6){ top: 540px; left: 54%;  width: 38%; }
  }

  /* ---- Frame: modern classic cadre ---- */
  .frame{
    cursor:pointer;
    border: none;
    background:none;
    padding:0;
  }
  .frame-mat{
    background: #fff;
    padding: 10px 10px 26px;
    border-radius: 2px;
    box-shadow:
      0 1px 0 rgba(0,0,0,0.04),
      0 14px 28px rgba(91,20,30,0.14),
      0 0 0 1px rgba(212,175,55,0.35);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .frame:hover .frame-mat, .frame:active .frame-mat{
    transform: translateY(-6px) scale(1.04);
    box-shadow:
      0 1px 0 rgba(0,0,0,0.04),
      0 22px 38px rgba(91,20,30,0.22),
      0 0 0 1px var(--gold);
  }
  .frame-inner{
    position:relative;
    aspect-ratio: 4/5;
    overflow:hidden;
    background: linear-gradient(135deg, #f3dede, #e9c9c9);
  }
  .frame-inner::after{
    content:"";
    position:absolute; inset:0;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .frame-inner img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .frame-num{
    position:absolute; top:8px; left:8px;
    font-family:'Playfair Display', serif; font-style:italic;
    font-size:11px; color:#fff;
    background: rgba(91,20,30,0.55);
    padding: 2px 7px; border-radius:2px;
    letter-spacing:0.04em;
  }
  .frame-caption{
    font-family:'Playfair Display', serif; font-style:italic;
    font-size: 12.5px; color: var(--red-deep);
    margin-top: 8px; text-align:center;
  }

  .placeholder-icon{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color: rgba(139,21,56,0.35);
    font-size:26px;
  }

  /* ===== FINAL CTA ===== */
  .final{
    padding: 10vh 8vw 14vh;
    text-align:center;
    background: linear-gradient(180deg, #fdf3f3 0%, #f7e3e3 100%);
  }
  .final p{
    max-width: 360px; margin: 0 auto 30px;
    color:#6b4a4f; font-size:14px; line-height:1.7;
    font-family:'Playfair Display', serif; font-style:italic; font-size:17px; color:var(--red-deep);
  }
  .gift-btn{
    font-family:'Inter', sans-serif;
    font-weight:600; font-size:13.5px; letter-spacing:0.04em;
    color:#fff;
    background: linear-gradient(135deg, var(--red), var(--red-deep));
    border:none; border-radius: 999px;
    padding: 17px 34px;
    cursor:pointer;
    box-shadow: 0 10px 26px rgba(139,21,56,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .gift-btn:active{
    transform: scale(0.96);
    box-shadow: 0 4px 14px rgba(139,21,56,0.35);
  }

  /* ===== Lightbox ===== */
  .lightbox{
    position:fixed; inset:0; z-index:200;
    background: rgba(20,8,12,0.92);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity 0.25s ease;
    padding: 6vh 6vw;
  }
  .lightbox.open{ opacity:1; pointer-events:auto; }
  .lightbox-card{
    background:#fff; padding:12px 12px 18px; border-radius:3px;
    max-width: 92vw; max-height: 86vh;
    transform: scale(0.92);
    transition: transform 0.25s ease;
  }
  .lightbox.open .lightbox-card{ transform: scale(1); }
  .lightbox-card img{
    display:block; max-width: 100%; max-height: 70vh; object-fit:contain;
  }
  .lightbox-caption{
    font-family:'Playfair Display', serif; font-style:italic;
    text-align:center; margin-top:10px; color: var(--red-deep); font-size:14px;
  }
  .lightbox-close{
    position:absolute; top: 22px; right: 22px;
    width:38px; height:38px; border-radius:50%;
    background: rgba(255,255,255,0.12);
    border:none; color:#fff; font-size:18px;
    cursor:pointer;
  }
</style>
</head>
<body>

<!-- ===== BACKGROUND MUSIC (plays continuously across all pages) ===== -->
<audio id="bgMusic" src="songs/song.mp3" loop preload="auto"></audio>
<script>
  (function(){
    const audio = document.getElementById('bgMusic');
    const STORAGE_KEY = 'bgMusicTime';
    const PLAYING_KEY = 'bgMusicPlaying';

    const savedTime = parseFloat(localStorage.getItem(STORAGE_KEY));
    if (!isNaN(savedTime)) {
      audio.currentTime = savedTime;
    }

    if (localStorage.getItem(PLAYING_KEY) === 'true') {
      audio.play().catch(() => {});
    }

    function startOnFirstInteraction(){
      if (audio.paused) {
        audio.play().catch(() => {});
      }
      document.removeEventListener('click', startOnFirstInteraction);
      document.removeEventListener('touchstart', startOnFirstInteraction);
    }
    document.addEventListener('click', startOnFirstInteraction);
    document.addEventListener('touchstart', startOnFirstInteraction);

    setInterval(() => {
      localStorage.setItem(STORAGE_KEY, audio.currentTime);
      localStorage.setItem(PLAYING_KEY, (!audio.paused).toString());
    }, 500);

    window.addEventListener('beforeunload', () => {
      localStorage.setItem(STORAGE_KEY, audio.currentTime);
      localStorage.setItem(PLAYING_KEY, (!audio.paused).toString());
    });
  })();
</script>

  <!-- ===== HERO BOUQUET ===== -->
  <section class="hero">
    <div class="eyebrow">a gift, mid-bloom</div>
    <svg class="bouquet" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
      <defs>

          <path d="M0 -20 L0 62" stroke="#9C5C82" stroke-width="1" opacity="0.5"/>
        </g>
        <!-- small white feather, far left, short -->
        <g transform="translate(36,140) rotate(-30)">

          <path d="M0 -20 L0 62" stroke="#D9CDE0" stroke-width="1" opacity="0.5"/>
        </g>

          <path d="M0 -30 L0 86" stroke="#B14C76" stroke-width="1" opacity="0.5"/>
        </g>
      </g>

      <!-- ===================== LEAVES (mid layer, tucked around and under the bloom mass) ===================== -->
      <g fill="url(#leafGrad2)">
        <path d="M150 270 C 130 224 118 180 132 134 C 150 172 158 224 150 270 Z"/>
        <path d="M78 280 C 50 248 34 208 46 168 C 72 196 88 240 78 280 Z"/>
        <path d="M222 280 C 250 248 266 208 254 168 C 228 196 212 240 222 280 Z"/>
        <path d="M40 250 C 16 234 2 210 8 184 C 30 196 44 222 40 250 Z"/>
        <path d="M260 250 C 284 234 298 210 292 184 C 270 196 256 222 260 250 Z"/>
        <path d="M150 280 C 136 256 130 230 140 204 C 154 228 160 256 150 280 Z" opacity="0.85"/>

      <!-- ===================== GERBERA DAISY BLOOMS ===================== -->
      <!-- Dense, overlapping cluster — every bloom drawn at the same
           base scale/petal style but placed close together so
           almost no gap shows between them, like a tightly packed

        <g fill="url(#gOrange)" stroke="#C9501A" stroke-width="0.5" stroke-opacity="0.4">

      <!-- middle row -->

        <g fill="url(#gPink)" stroke="#C9437C" stroke-width="0.5" stroke-opacity="0.4">
          <ellipse cx="0" cy="-22" rx="6" ry="16"/>
          <ellipse cx="12" cy="-18" rx="6" ry="16" transform="rotate(40 12 -18)"/>
          <ellipse cx="20" cy="-6" rx="6" ry="16" transform="rotate(80 20 -6)"/>

  /* ---------------------------------------------------------
     Watercolor sky decorations for the gallery section —
     reused from page1's style: clouds, a moon, floating hearts,
     and lavender flowers scattered around the scattered photos.
  --------------------------------------------------------- */
  function cloudSVG(){
    return `<svg viewBox="0 0 140 80" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <g fill="#FFFFFF" opacity="0.9">
        <ellipse cx="40" cy="50" rx="32" ry="20"/>
        <ellipse cx="75" cy="38" rx="38" ry="26"/>
        <ellipse cx="110" cy="52" rx="26" ry="17"/>
      </g>
    </svg>`;
  }

  function moonSVG(){
    return `<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="galMoonGrad" cx="35%" cy="35%" r="70%">
          <stop offset="0%" stop-color="#F3F8FB"/>
          <stop offset="100%" stop-color="#C9DEE9"/>
        </radialGradient>
      </defs>
      <path d="M62 10 C 40 10, 22 28, 22 50 C 22 72, 40 90, 62 90 C 48 80, 40 66, 40 50 C 40 34, 48 20, 62 10 Z" fill="url(#galMoonGrad)"/>
    </svg>`;
  }

  function heartSVG(shade){
    const id = 'galHg-' + shade.replace('#','');
    return `<svg viewBox="0 0 100 90" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="${id}" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#EAF4FA"/>
          <stop offset="55%" stop-color="${shade}"/>
          <stop offset="100%" stop-color="#2F5475"/>
        </radialGradient>
      </defs>
      <path d="M50 84 C 18 60, 4 40, 4 24 C 4 8, 18 0, 30 0 C 40 0, 48 6, 50 14 C 52 6, 60 0, 70 0 C 82 0, 96 8, 96 24 C 96 40, 82 60, 50 84 Z" fill="url(#${id})" stroke="#2F5475" stroke-width="1" stroke-opacity="0.25"/>
    </svg>`;
  }

  function flowerSVG(petal, dark){
    return `<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <g fill="${petal}" opacity="0.95">
        <circle cx="50" cy="32" r="13"/>
        <circle cx="50" cy="68" r="13"/>
        <circle cx="32" cy="50" r="13"/>
        <circle cx="68" cy="50" r="13"/>
        <circle cx="37" cy="37" r="11"/>
        <circle cx="63" cy="63" r="11"/>
        <circle cx="63" cy="37" r="11"/>
        <circle cx="37" cy="63" r="11"/>
      </g>
      <circle cx="50" cy="50" r="12" fill="${dark}"/>
    </svg>`;
  }

  const galleryBg = document.getElementById('galleryBg');

  const galleryDecorations = [
    { html: cloudSVG(), w: '30vw', top: '2%',  left: '-4%',  z: 1 },
    { html: cloudSVG(), w: '26vw', top: '88%', left: '70%',  z: 1 },
    { html: moonSVG(),  w: '12vw', top: '4%',  left: '80%',  z: 1 },
    { html: heartSVG('#6FA3C7'), w: '12vw', top: '8%',  left: '6%',  z: 1, type:'heart' },
    { html: heartSVG('#5B92BC'), w: '10vw', top: '92%', left: '4%',  z: 1, type:'heart' },
    { html: heartSVG('#6FA3C7'), w: '10vw', top: '46%', left: '90%', z: 1, type:'heart' },
    { html: flowerSVG('#A89BCB', '#6B5B95'), w: '9vw', top: '94%', left: '82%', z: 1 },
    { html: flowerSVG('#9B86C2', '#5B4A85'), w: '7vw', top: '2%',  left: '40%', z: 1 },
  ];

  galleryDecorations.forEach(d => {
    const el = document.createElement('div');
    el.className = 'gallery-bg-deco';
    el.style.width = d.w;
    el.style.top = d.top;
    el.style.left = d.left;
    el.style.zIndex = d.z;

    if (d.type === 'heart'){
      el.classList.add('gallery-float-3d');
      el.style.setProperty('--float-dur', (6 + Math.random() * 3).toFixed(2) + 's');
      el.style.setProperty('--float-delay', (Math.random() * 3).toFixed(2) + 's');
      el.style.setProperty('--drift-y', (14 + Math.random() * 10).toFixed(0) + 'px');
      el.style.setProperty('--tilt', (8 + Math.random() * 10).toFixed(0) + 'deg');

      const shadow = document.createElement('div');
      shadow.className = 'gallery-heart-shadow';
      shadow.style.setProperty('--float-dur', el.style.getPropertyValue('--float-dur'));
      shadow.style.setProperty('--float-delay', el.style.getPropertyValue('--float-delay'));

      const shape = document.createElement('div');
      shape.className = 'gallery-heart-shape';
      shape.style.setProperty('--float-dur', el.style.getPropertyValue('--float-dur'));
      shape.style.setProperty('--float-delay', el.style.getPropertyValue('--float-delay'));
      shape.innerHTML = d.html;

      el.appendChild(shadow);
      el.appendChild(shape);
    } else {
      el.innerHTML = d.html;
    }

    galleryBg.appendChild(el);
  });

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCap = document.getElementById('lightboxCap');

  document.querySelectorAll('.frame').forEach(btn => {
    btn.addEventListener('click', () => {
      lightboxImg.src = btn.dataset.img;
      lightboxCap.textContent = btn.dataset.cap;
      lightbox.classList.add('open');
    });
  });

  document.getElementById('lightboxClose').addEventListener('click', () => {
    lightbox.classList.remove('open');
  });
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) lightbox.classList.remove('open');
  });

  document.getElementById('giftBtn').addEventListener('click', () => {
    window.location.href = NEXT_PAGE;
  });
</script>

</body>
</html>
