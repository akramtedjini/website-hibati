<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Angel — Massive Attack ❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
    cursor: pointer;
  }

  .heart {
    position: relative;
    width: 0;
    height: 0;
    transition: filter 0.3s;
  }

  .word {
    position: absolute;
    font-size: 14px;
    font-weight: bold;
    white-space: nowrap;
    color: #ff4d8d;
    text-shadow:
      0 0 8px  #ff1a5c,
      0 0 16px #ff0044;
    opacity: 0;
    will-change: opacity, transform;
  }
</style>
</head>
<body>
<audio id="audio" src="angel.mp3" loop></audio>

  <div class="heart" id="heart"></div>

<script>
  const heart = document.getElementById('heart');
  const NUM   = 90;
  const SCALE = 18;
  const words = [];

  // Build the heart
  for (let i = 0; i < NUM; i++) {
    const t = (i / NUM) * Math.PI * 2;
    const x =  16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t)
              - 5  * Math.cos(2*t)
              - 2  * Math.cos(3*t)
              -      Math.cos(4*t));

    const w = document.createElement('div');
    w.className   = 'word';
    w.textContent = 'I love you';
    w.style.left  = (x * SCALE) + 'px';
    w.style.top   = (y * SCALE) + 'px';
    w.dataset.tilt = 0;

    heart.appendChild(w);
    words.push(w);
  }

  // Animation state
  let phase    = 0;
  let elapsed  = 0;
  let lastTime = performance.now();
  const CYCLE  = 30;

  function getSpeed(t) {
    const r = t / CYCLE;
    if (r < 0.40) {
      return 0.4 + r * 1.5;
    } else if (r < 0.73) {
      const u = (r - 0.40) / 0.33;
      return 1.0 + Math.pow(u, 2.2) * 11;
    } else {
      const u = (r - 0.73) / 0.27;
      return 12 + Math.sin(t * 30) * 3 + u * 4;
    }
  }

  function frame(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    elapsed += dt;
    if (elapsed >= CYCLE) elapsed = 0;

    const speed = getSpeed(elapsed);
    phase += speed * dt;

    const intensity = Math.min(speed / 14, 1);
    const hue        = 340 - intensity * 15;
    const lightness  = 65 + intensity * 10;
    const glow       = 8 + intensity * 25;

    const climaxPulse = intensity > 0.7
      ? 1 + Math.sin(elapsed * 25) * 0.04
      : 1;
    heart.style.transform = `scale(${climaxPulse})`;
    heart.style.filter    = `drop-shadow(0 0 ${intensity * 30}px rgba(255, 30, 90, ${intensity}))`;

    for (let i = 0; i < NUM; i++) {
      const wp = (phase + i / NUM) % 1;
      const sharpness = 2 + intensity * 6;
      const op  = Math.pow(Math.sin(wp * Math.PI), sharpness);

      const w = words[i];
      const sc = 0.7 + op * (0.3 + intensity * 0.3);
      w.style.opacity   = op;
      w.style.transform = `translate(-50%, -50%) rotate(${w.dataset.tilt}deg) scale(${sc})`;
      w.style.color     = `hsl(${hue}, 100%, ${lightness}%)`;
      w.style.textShadow = `0 0 ${glow}px hsl(${hue}, 100%, 50%), 0 0 ${glow * 2}px hsl(${hue}, 100%, 40%)`;
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame((t) => { lastTime = t; frame(t); });

 function restart() {
  elapsed = 0;
  phase   = 0;
  const audio = document.getElementById('audio');
  audio.currentTime = 0;
  audio.play();
}

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); restart(); }
  });
  document.body.addEventListener('click', restart);
</script>
</body>
</html>
